{% extends "base.html" %}
{% block title %}Beitrag bearbeiten – Forum{% endblock %}
{% block page_title %}✏️ Beitrag bearbeiten{% endblock %}

{% block topbar_actions %}
  <a href="{{ url_for('forum.detail', beitrag_id=beitrag.id) }}" class="btn btn-outline btn-sm">← Zurück</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-header"><h2>Beitrag bearbeiten</h2></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label for="titel">Titel *</label>
        <input type="text" id="titel" name="titel" class="form-control"
               value="{{ beitrag.titel }}" required autofocus/>
      </div>
      <div class="form-group">
        <label for="kategorie">Kategorie *</label>
        <select id="kategorie" name="kategorie" class="form-control">
          {% for kat in kategorien %}
            <option value="{{ kat }}" {% if kat == beitrag.kategorie %}selected{% endif %}>{{ kat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="inhalt">Inhalt *</label>
        <textarea id="inhalt" name="inhalt" class="form-control" rows="8" required>{{ beitrag.inhalt }}</textarea>
      </div>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">💾 Speichern</button>
        <a href="{{ url_for('forum.detail', beitrag_id=beitrag.id) }}" class="btn btn-outline">Abbrechen</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
